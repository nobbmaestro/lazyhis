name: Continous Integration

on:
  push:
    branches: [master, development]

  schedule:
    - cron: "0 3 * * *" # Runs every night at 03:00

jobs:
  flake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Run checks
        run: nix flake check
